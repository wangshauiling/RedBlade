server:
  port: 8080

spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:redblade
    username: system
    password: oracle

  data:
    redis:
      host: localhost
      port: 6379
      password:

logging:
  level:
    com.redblade: info

rb:
  database:
    type: oracle
  init:
    enabled: true
    mode: create-if-not-exists