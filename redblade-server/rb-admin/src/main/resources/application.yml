server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: redblade-server

  profiles:
    active: dev

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/redblade
    username: postgres
    password: shuailing9230
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: RedBladeHikariPool

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.redblade.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# RedBlade配置
rb:
  # 数据库类型（oracle / postgresql）
  database:
    type: postgresql

  # JWT配置
  jwt:
    secret: RedBladeSecretKeyForJwtTokenGenerationAndValidation2024
    access-token-expiration: 7200000  # 2小时
    refresh-token-expiration: 604800000  # 7天
    issuer: RedBlade

  # 数据库初始化配置
  init:
    enabled: true
    mode: create-if-not-exists
    drop-before-create: false
    version-table: sys_init_version

# 日志配置
logging:
  level:
    com.redblade: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"