server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://prod-db:5432/redblade
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: prod-redis
      port: 6379
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.redblade: info
    org.springframework: warn

rb:
  init:
    enabled: false