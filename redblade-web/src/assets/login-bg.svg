<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>

  <!-- 网格图案 -->
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 装饰圆形 -->
  <circle cx="200" cy="200" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1720" cy="880" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="960" cy="540" r="300" fill="rgba(255,255,255,0.03)"/>

  <!-- 装饰线条 -->
  <path d="M 0 800 Q 480 600 960 700 T 1920 500" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  <path d="M 0 900 Q 480 700 960 800 T 1920 600" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="none"/>

  <!-- 装饰点 -->
  <circle cx="300" cy="400" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="500" cy="300" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1400" cy="200" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="1600" cy="400" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1200" cy="800" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="800" cy="900" r="3" fill="rgba(255,255,255,0.2)"/>
</svg>